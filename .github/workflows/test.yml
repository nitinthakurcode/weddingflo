name: Test Suite

on:
  push:
    branches: [main, staging, develop]
  pull_request:
    branches: [main]

env:
  NODE_OPTIONS: --max_old_space_size=4096

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests (vitest)
        run: npm run test:ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage/lcov.info
          flags: unit
          token: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest

    # Real-DB chatbot integration suite (vitest.integration.config.ts). Runs against an
    # ephemeral Postgres built purely from the journaled Drizzle migrations, so a green
    # run also proves the schema is reproducible from migrations alone. The harness
    # connects as a superuser (RLS bypass + session_replication_role), so no RLS/role
    # bootstrap is needed. The live-LLM spec self-skips when no AI key is present.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weddingflo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/weddingflo_test

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Apply Drizzle migrations
        run: npm run db:migrate

      - name: Run integration tests (vitest)
        run: npm run test:integration

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Drizzle migration consistency check
        run: npx drizzle-kit check
        env:
          DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
          SKIP_ENV_VALIDATION: 'true'

  build:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          # Supabase
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # BetterAuth
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # OpenAI
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Stripe
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          # Firebase
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          # Resend
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          # Skip telemetry and env validation during CI build
          NEXT_TELEMETRY_DISABLED: 1
          SKIP_ENV_VALIDATION: 'true'

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    # ROOT-CAUSE FIX: provision the Rail-3 proven NON-PROD Postgres the booted app needs
    # (mirrors the integration-tests job + audit.yml). Playwright's webServer runs `npm run dev`,
    # whose first auth request queries Postgres (rate_limit_entries) — without this service it
    # died ECONNREFUSED and every spec failed. The db name carries the `test` token so any
    # in-app non-prod guard stays satisfied. (Redis/SRH intentionally omitted: no e2e spec
    # asserts realtime and the app degrades gracefully without Redis — warns, never throws.)
    services:
      postgres:
        image: postgres:16-alpine # same image as the proven test stack (audit.yml)
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: weddingflo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Proven non-prod DB (host=localhost ∈ guard regex; db carries the `test` token).
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/weddingflo_test
      # Inert-but-VALID auth keys so the dev server can sign/verify a real BetterAuth session
      # in CI. Throwaway CI values, NOT real secrets (zero ${{ secrets.* }} in this job).
      BETTER_AUTH_SECRET: e2e_ci_inert_better_auth_secret_min32_0123456789
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      TOKEN_ENCRYPTION_KEY: BwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwcHBwc= # inert 32-byte base64
      # Deterministic seeded credential (matches e2e/helpers/auth.ts defaults) — the seed step
      # below creates this user/company in-DB, so NO absent TEST_USER_* repo secret is used.
      TEST_USER_EMAIL: test@test.com
      TEST_USER_PASSWORD: E2eTest!Pass123
      # INERT side-effect sandbox — a stray email/SMS/charge/upload can't reach a real provider.
      RESEND_API_KEY: test_inert_resend
      TWILIO_ACCOUNT_SID: ACtest_inert
      TWILIO_AUTH_TOKEN: test_inert_twilio
      TWILIO_PHONE_NUMBER: '+15005550006'
      STRIPE_SECRET_KEY: sk_test_inert
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_inert
      FIREBASE_ADMIN_PROJECT_ID: test-inert
      FIREBASE_ADMIN_CLIENT_EMAIL: test@inert.local
      FIREBASE_ADMIN_PRIVATE_KEY: test_inert
      R2_ENDPOINT: http://127.0.0.1:9/inert
      R2_ACCESS_KEY_ID: test_inert
      R2_SECRET_ACCESS_KEY: test_inert
      R2_BUCKET_NAME: weddingflo-test-inert
      NEXT_TELEMETRY_DISABLED: 1
      SKIP_ENV_VALIDATION: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Apply Drizzle migrations (schema from journaled migrations only)
        run: npm run db:migrate

      - name: Rail-3 non-prod proof (host=localhost / db=weddingflo_test)
        run: node -e "const u=new URL(process.env.DATABASE_URL);console.log('DB host=%s db=%s',u.hostname,u.pathname.slice(1))"

      - name: Seed deterministic E2E user + company (no secret dependency)
        run: npx tsx scripts/seed-e2e-user.ts

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  all-tests-passed:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, type-check, build, e2e-tests]
    if: always()

    steps:
      - name: Check if all tests passed
        run: |
          if [ "${{ needs.unit-tests.result }}" != "success" ] || \
             [ "${{ needs.integration-tests.result }}" != "success" ] || \
             [ "${{ needs.type-check.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ] || \
             [ "${{ needs.e2e-tests.result }}" != "success" ]; then
            echo "One or more test jobs failed"
            exit 1
          fi
          echo "All tests passed successfully!"
