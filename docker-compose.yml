# Docker Compose for WeddingFlo
# Security February 2026
#
# Includes:
# - PostgreSQL with security hardening
# - PgBouncer for connection pooling
# - Redis for caching (optional)

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: weddingflo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weddingflo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-weddingflo}
      # Security settings
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weddingflo} -d ${POSTGRES_DB:-weddingflo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weddingflo-network
    # Don't expose directly - use PgBouncer
    # ports:
    #   - "5432:5432"
    command:
      - "postgres"
      # Connection limits
      - "-c"
      - "max_connections=100"
      # Performance tuning
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "maintenance_work_mem=64MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      # Logging for security monitoring
      - "-c"
      - "log_statement=ddl"
      - "-c"
      - "log_connections=on"
      - "-c"
      - "log_disconnections=on"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_lock_waits=on"
      # Security settings
      - "-c"
      - "ssl=off"  # Enable if you have certs

  # PgBouncer Connection Pooler
  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: weddingflo-pgbouncer
    restart: unless-stopped
    environment:
      # Database configuration
      DATABASE_URL: postgres://${POSTGRES_USER:-weddingflo}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-weddingflo}
      # PgBouncer settings
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 200
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      MAX_DB_CONNECTIONS: 50
      # Security
      AUTH_TYPE: scram-sha-256
      IGNORE_STARTUP_PARAMETERS: extra_float_digits
      # Logging
      LOG_CONNECTIONS: 1
      LOG_DISCONNECTIONS: 1
      LOG_POOLER_ERRORS: 1
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-p", "5432", "-U", "${POSTGRES_USER:-weddingflo}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weddingflo-network

  # Automated Database Backup (daily at 2 AM)
  backup-cron:
    image: alpine:3.19
    container_name: weddingflo-backup-cron
    restart: unless-stopped
    volumes:
      - ./scripts:/scripts:ro
      - backup_data:/tmp/weddingflo-backups
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-weddingflo}
      POSTGRES_USER: ${POSTGRES_USER:-weddingflo}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
    command: >
      sh -c "apk add --no-cache postgresql16-client aws-cli bash gzip &&
             echo '0 2 * * * /scripts/backup-postgres.sh >> /var/log/backup.log 2>&1' > /etc/crontabs/root &&
             echo '0 3 * * 0 /scripts/verify-backup.sh >> /var/log/verify-backup.log 2>&1' >> /etc/crontabs/root &&
             crond -f -l 2"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - weddingflo-network

  # Redis — realtime sync pub/sub + rate limiting (self-hosted, replaces Upstash)
  # Self-hosting removes the free-tier inactivity auto-deletion that previously
  # killed production realtime. Durable via AOF (appendonly).
  redis:
    image: redis:7-alpine
    container_name: weddingflo-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    # No host port mapping in production — reached only over the internal network
    # by the `srh` bridge below. Uncomment for local debugging with redis-cli.
    # ports:
    #   - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weddingflo-network

  # SRH (Serverless Redis HTTP) — HTTP/REST front for Redis.
  # The app talks to Redis through the `@upstash/redis` REST client, which speaks
  # HTTP, not the Redis TCP protocol. SRH bridges the two so the existing code in
  # src/lib/realtime/redis-pubsub.ts and src/lib/redis/rate-limiter.ts works
  # unchanged — just point UPSTASH_REDIS_REST_URL at this service.
  srh:
    image: hiett/serverless-redis-http:latest
    container_name: weddingflo-srh
    restart: unless-stopped
    environment:
      SRH_MODE: env
      # Must equal UPSTASH_REDIS_REST_TOKEN in the app env. Generate a strong
      # random value, e.g.  openssl rand -hex 32
      SRH_TOKEN: ${SRH_TOKEN:?SRH_TOKEN is required}
      SRH_CONNECTION_STRING: "redis://redis:6379"
    # Internal endpoint for the app:  http://srh:80
    # Expose a host port only if you need to verify from outside the network.
    ports:
      - "8079:80"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null --header=\"Authorization: Bearer $${SRH_TOKEN}\" http://localhost:80/get/srh-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weddingflo-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backup_data:
    driver: local

networks:
  weddingflo-network:
    driver: bridge
